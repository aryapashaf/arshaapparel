<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>All Products | ArshaApparel</title>

  <!-- CSS -->
  <link rel="stylesheet" href="sale-item.css">

  <!-- FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-left">
      <a class="logo back-logo" href="index.html" aria-label="Back to previous page">
        <span class="back-icon">←</span>
        ArshaApparel
      </a>
    </div>

    <div class="nav-right">
      <div class="category-wrap" id="categoryWrap">
        <button class="category-toggle" id="categoryToggle" type="button" aria-label="Category filter" aria-expanded="false">
          <span class="category-icon" aria-hidden="true">&#128203;</span>
          <span class="category-label" id="categoryLabel">All Category</span>
          <span class="category-caret" aria-hidden="true"></span>
        </button>
        <div class="category-dropdown" id="categoryDropdown" role="listbox" aria-hidden="true">
          <button class="category-option is-active" type="button" data-value="all">All Category</button>
          <button class="category-option" type="button" data-value="shirt">Shirt</button>
          <button class="category-option" type="button" data-value="t-shirt">T-shirt</button>
          <button class="category-option" type="button" data-value="jacket">Jacket</button>
          <button class="category-option" type="button" data-value="hoodie">Hoodie</button>
          <button class="category-option" type="button" data-value="shoes">Shoes</button>
          <button class="category-option" type="button" data-value="socks">Socks</button>
          <button class="category-option" type="button" data-value="sandals">Sandals</button>
          <button class="category-option" type="button" data-value="pants">Pants</button>
        </div>
        <div class="select-wrap">
          <select class="category-select" id="categorySelect">
            <option value="all" selected>All Category</option>
            <option value="shirt">Shirt</option>
            <option value="t-shirt">T-shirt</option>
            <option value="jacket">Jacket</option>
            <option value="hoodie">Hoodie</option>
            <option value="shoes">Shoes</option>
            <option value="socks">Socks</option>
            <option value="sandals">Sandals</option>
            <option value="pants">Pants</option>
          </select>
        </div>
      </div>

      <div class="search-box" id="searchBox">
        <input 
          type="text"
          class="search-input"
          id="searchInput"
          placeholder="Search product..."
        />
      </div>
      <button class="search-toggle" id="searchToggle" type="button" aria-label="Search">
        &#128269;
      </button>

      <a class="cart-link" href="cart.html" aria-label="Cart">
        &#128722;
        <span class="cart-badge" id="cartBadge" aria-hidden="true"></span>
      </a>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="container">
    <h1 class="page-title">All Products</h1>

    <section class="product-grid" id="productGrid">

      <!-- CARD -->
      <div class="product-card">
        <div class="product-image">Loading...</div>
        <div class="product-info">
          <h3>Loading products...</h3>
          <p class="category">...</p>
          <p class="price">$0.00</p>
        </div>
      </div>

    </section>
  </main>

  <div class="add-cart-modal" id="addCartModal" aria-hidden="true">
    <div class="add-cart-modal-card" role="dialog" aria-modal="true" aria-labelledby="addCartTitle">
      <div class="add-cart-head">
        <h3 id="addCartTitle">Add to Cart</h3>
        <button class="add-cart-close" id="addCartClose" type="button" aria-label="Close">x</button>
      </div>
      <p class="add-cart-name" id="addCartProductName">Product</p>
      <div class="add-cart-field">
        <label id="addCartSizeLabel" for="addCartSize">Size</label>
        <select id="addCartSize"></select>
        <small id="addCartSizeHint"></small>
      </div>
      <div class="add-cart-field">
        <label id="addCartQtyLabel">Quantity</label>
        <div class="add-cart-qty">
          <button type="button" id="addCartQtyMinus">-</button>
          <span id="addCartQtyValue">1</span>
          <button type="button" id="addCartQtyPlus">+</button>
        </div>
      </div>
      <button class="add-cart-confirm" id="addCartConfirm" type="button">Add to Cart</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="supabase-init.js"></script>
  <script src="currency-converter.js"></script>
  <script>
    const productGrid = document.getElementById('productGrid');
    const searchInput = document.getElementById('searchInput');
    const categorySelect = document.getElementById('categorySelect');
    const supabaseClient = window.supabaseClient;
    const categoryToggle = document.getElementById('categoryToggle');
    const categoryWrap = document.getElementById('categoryWrap');
    const categoryDropdown = document.getElementById('categoryDropdown');
    const categoryLabel = document.getElementById('categoryLabel');
    const searchToggle = document.getElementById('searchToggle');
    const searchBox = document.getElementById('searchBox');
    const cartBadge = document.getElementById('cartBadge');
    const backLink = document.querySelector('.back-logo');
    const addCartModal = document.getElementById('addCartModal');
    const addCartClose = document.getElementById('addCartClose');
    const addCartProductName = document.getElementById('addCartProductName');
    const addCartSize = document.getElementById('addCartSize');
    const addCartSizeHint = document.getElementById('addCartSizeHint');
    const addCartQtyMinus = document.getElementById('addCartQtyMinus');
    const addCartQtyPlus = document.getElementById('addCartQtyPlus');
    const addCartQtyValue = document.getElementById('addCartQtyValue');
    const addCartConfirm = document.getElementById('addCartConfirm');
    let allProducts = [];
    let cartSupportsSize = true;
    let productSupportsSizes = true;
    let selectedAddCartProduct = null;
    let selectedAddCartQty = 1;

    function formatPrice(value) {
      const number = Number(value);
      if (Number.isNaN(number)) {
        return (window.currencyService && window.currencyService.formatFromIDR)
          ? window.currencyService.formatFromIDR(0)
          : '0';
      }
      return (window.currencyService && window.currencyService.formatFromIDR)
        ? window.currencyService.formatFromIDR(number)
        : number;
    }

    function isVideoUrl(url) {
      return /\.(mp4|webm|ogg|mov|m4v)$/i.test(String(url || ''));
    }

    let themeAlertTimer = null;
    function showThemeAlert(message) {
      if (!message) return;
      const existing = document.getElementById('themeAlert');
      if (existing) existing.remove();

      const alertEl = document.createElement('div');
      alertEl.id = 'themeAlert';
      alertEl.className = 'theme-alert';
      alertEl.setAttribute('role', 'alert');
      alertEl.textContent = String(message);
      document.body.appendChild(alertEl);

      requestAnimationFrame(() => alertEl.classList.add('is-show'));
      if (themeAlertTimer) clearTimeout(themeAlertTimer);
      themeAlertTimer = setTimeout(() => {
        alertEl.classList.remove('is-show');
        setTimeout(() => alertEl.remove(), 200);
      }, 2400);
    }

    function renderProductMedia(url, alt) {
      if (!url) return `<div class="product-image product-image--empty"></div>`;
      if (isVideoUrl(url)) {
        return `<div class="product-image"><video class="product-media-el" src="${url}" muted loop playsinline preload="metadata"></video></div>`;
      }
      return `<div class="product-image"><img class="product-media-el" src="${url}" alt="${alt || 'Product'}" loading="lazy"></div>`;
    }

    function normalizeSizeList(product) {
      if (!product) return [];
      if (Array.isArray(product.sizes)) {
        return product.sizes.filter((value) => typeof value === 'string' && value.trim());
      }
      if (typeof product.sizes === 'string') {
        try {
          const parsed = JSON.parse(product.sizes);
          if (Array.isArray(parsed)) {
            return parsed.filter((value) => typeof value === 'string' && value.trim());
          }
        } catch (error) {}
      }
      return [];
    }

    function setAddCartModalOpen(open) {
      if (!addCartModal) return;
      addCartModal.classList.toggle('is-open', open);
      addCartModal.setAttribute('aria-hidden', open ? 'false' : 'true');
    }

    function renderAddCartSizeOptions(product) {
      if (!addCartSize) return;
      const tr = window.__i18nTr || ((key) => key);
      const trf = window.__i18nTrf || ((_, params) => `${params.count} size(s) available.`);
      const sizes = normalizeSizeList(product);
      if (sizes.length === 0) {
        addCartSize.innerHTML = `<option value="">${tr('size_default')}</option>`;
        addCartSize.disabled = true;
        if (addCartSizeHint) addCartSizeHint.textContent = tr('no_size_selection');
        return;
      }
      addCartSize.disabled = false;
      addCartSize.innerHTML = sizes.map((size) => `<option value="${size}">${size}</option>`).join('');
      if (addCartSizeHint) addCartSizeHint.textContent = trf('size_count_available', { count: sizes.length });
    }

    function openAddCartModal(productId) {
      const product = allProducts.find((item) => String(item.id) === String(productId));
      if (!product) return;
      selectedAddCartProduct = { ...product, stock: Number(product.stock) };
      selectedAddCartQty = 1;
      if (addCartQtyValue) addCartQtyValue.textContent = String(selectedAddCartQty);
      if (addCartProductName) addCartProductName.textContent = product.name || (window.__i18nTr ? window.__i18nTr('product_col') : 'Product');
      renderAddCartSizeOptions(product);
      setAddCartModalOpen(true);
    }

    function renderProducts(items) {
      if (!productGrid) return;
      const tr = window.__i18nTr || ((key) => key);
      const categoryKey = window.__i18nCategoryKey || (() => null);
      if (!items || items.length === 0) {
        productGrid.innerHTML = `
          <div class="product-card">
            <div class="product-image">${tr('no_products_yet')}</div>
            <div class="product-info">
              <h3>${tr('products_not_found')}</h3>
              <p class="category">${tr('try_another_keyword')}</p>
              <p class="price">Rp0</p>
            </div>
          </div>
        `;
        return;
      }

      productGrid.innerHTML = items.map(product => `
        <div class="product-card" data-product-id="${product.id}">
          ${renderProductMedia(product.image, product.name)}
          <div class="product-info">
            <h3>${product.name}</h3>
            <p class="category">${(function () {
              const key = categoryKey(product.category);
              return key ? tr(key) : (product.category || '-');
            })()}</p>
            <p class="price">${formatPrice(product.price)}</p>
            <button class="btn-add-cart" type="button" data-product-id="${product.id}">Add to Cart</button>
          </div>
        </div>
      `).join('');
    }

    function goToProductDetail(productId) {
      if (!productId) return;
      window.location.href = `product-detail.html?id=${encodeURIComponent(productId)}`;
    }

    function applyFilters() {
      const keyword = searchInput?.value.trim().toLowerCase() || '';
      const selectedCategory = categorySelect?.value || 'all';

      let filtered = allProducts;
      if (selectedCategory !== 'all') {
        filtered = filtered.filter(product =>
          (product.category || '').toLowerCase() === selectedCategory
        );
      }

      if (keyword) {
        filtered = filtered.filter(product =>
          product.name?.toLowerCase().includes(keyword) ||
          product.category?.toLowerCase().includes(keyword)
        );
      }

      renderProducts(filtered);
    }

    function syncCategoryDropdown() {
      if (!categoryDropdown || !categorySelect) return;
      const current = categorySelect.value || 'all';
      if (categoryLabel) {
        const currentOption = Array.from(categorySelect.options).find(option => option.value === current);
        categoryLabel.textContent = currentOption?.textContent || 'All Category';
      }
      categoryDropdown.querySelectorAll('.category-option').forEach((option) => {
        option.classList.toggle('is-active', option.dataset.value === current);
      });
    }

    async function fetchProducts() {
      if (!supabaseClient) return;
      let data = null;
      let error = null;
      ({ data, error } = await supabaseClient
        .from('products')
        .select(productSupportsSizes ? 'id, name, price, category, image, status, stock, sizes' : 'id, name, price, category, image, status, stock')
        .neq('status', 'draft')
        .order('created_at', { ascending: false }));

      if (error && /sizes/i.test(String(error.message || ''))) {
        productSupportsSizes = false;
        ({ data, error } = await supabaseClient
          .from('products')
          .select('id, name, price, category, image, status, stock')
          .neq('status', 'draft')
          .order('created_at', { ascending: false }));
      }

      if (error) {
        console.warn('Failed to load products', error.message);
        return;
      }

      allProducts = data || [];
      applyFilters();
    }

    function applyCategoryFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const category = params.get('category');
      if (categorySelect && category) {
        const value = category.toLowerCase();
        const exists = Array.from(categorySelect.options).some(option => option.value === value);
        if (exists) {
          categorySelect.value = value;
          syncCategoryDropdown();
        }
      }
    }

    if (supabaseClient) {
      applyCategoryFromUrl();
      fetchProducts();
      supabaseClient
        .channel('public:products')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'products' }, fetchProducts)
        .subscribe();
    }

    window.addEventListener('currency:updated', applyFilters);

    if (searchInput) {
      searchInput.addEventListener('input', applyFilters);
    }

    if (categorySelect) {
      categorySelect.addEventListener('change', applyFilters);
      categorySelect.addEventListener('change', syncCategoryDropdown);
    }

    function setSearchOpen(open) {
      if (!searchBox) return;
      searchBox.classList.toggle('is-open', open);
      if (open && searchInput) {
        searchInput.focus();
      }
    }

    if (searchToggle) {
      searchToggle.addEventListener('click', (event) => {
        event.stopPropagation();
        const isOpen = searchBox?.classList.contains('is-open');
        setSearchOpen(!isOpen);
      });
    }

    if (searchBox) {
      searchBox.addEventListener('click', (event) => {
        event.stopPropagation();
      });
    }

    function setCategoryOpen(open) {
      if (!categoryWrap || !categoryDropdown) return;
      categoryWrap.classList.toggle('is-open', open);
      categoryToggle?.setAttribute('aria-expanded', open ? 'true' : 'false');
      categoryDropdown.setAttribute('aria-hidden', open ? 'false' : 'true');
    }

    if (categoryToggle) {
      categoryToggle.addEventListener('click', () => {
        const open = categoryWrap?.classList.contains('is-open');
        setCategoryOpen(!open);
        setSearchOpen(false);
      });
    }

    if (categoryDropdown) {
      categoryDropdown.addEventListener('click', (event) => {
        const button = event.target.closest('.category-option');
        if (!button || !categorySelect) return;
        categorySelect.value = button.dataset.value || 'all';
        syncCategoryDropdown();
        applyFilters();
        setCategoryOpen(false);
      });
    }

    document.addEventListener('click', (event) => {
      if (searchBox && searchToggle && !searchBox.contains(event.target) && !searchToggle.contains(event.target)) {
        setSearchOpen(false);
      }
      if (categoryWrap && !categoryWrap.contains(event.target)) {
        setCategoryOpen(false);
      }
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        setSearchOpen(false);
        setCategoryOpen(false);
      }
    });

    window.addEventListener('resize', () => {
      if (window.innerWidth > 820) {
        setSearchOpen(true);
        setCategoryOpen(false);
      }
    });

    if (searchBox) {
      setSearchOpen(window.innerWidth > 820);
    }

    syncCategoryDropdown();

    if (backLink) {
      backLink.addEventListener('click', (event) => {
        event.preventDefault();
        if (window.history.length > 1) {
          window.history.back();
        } else {
          window.location.href = 'index.html';
        }
      });
    }

    function getUserId() {
      const stored = localStorage.getItem('loginInfo') || sessionStorage.getItem('loginInfo');
      if (!stored) return null;
      try {
        const data = JSON.parse(stored);
        if (data.role !== 'user') return null;
        return data.email || data.name || null;
      } catch (error) {
        return null;
      }
    }

    function setCartBadge(count) {
      if (!cartBadge) return;
      if (count > 0) {
        cartBadge.textContent = count > 99 ? '99+' : String(count);
        cartBadge.style.display = 'inline-flex';
      } else {
        cartBadge.style.display = 'none';
      }
    }

    async function fetchCartCount() {
      if (!supabaseClient || !cartBadge) return;
      const userId = getUserId();
      if (!userId) {
        setCartBadge(0);
        return;
      }
      const { data, error } = await supabaseClient
        .from('cart_items')
        .select('quantity, product:products(status)')
        .eq('user_id', userId);

      if (error) {
        console.warn('Failed to load cart count', error.message);
        return;
      }
      const count = (data || []).reduce((sum, item) => {
        if (item.product?.status === 'draft') return sum;
        return sum + (item.quantity || 0);
      }, 0);
      setCartBadge(count);
    }

    async function addToCart(productId, quantity, selectedSize) {
      if (!supabaseClient || !productId) return false;
      const userId = getUserId();
      if (!userId) {
        window.location.href = 'login.html';
        return false;
      }
      const qty = Math.max(1, Number(quantity || 1));

      let productData = null;
      let productError = null;
      ({ data: productData, error: productError } = await supabaseClient
        .from('products')
        .select(productSupportsSizes ? 'stock, status, sizes' : 'stock, status')
        .eq('id', productId)
        .maybeSingle());

      if (productError && /sizes/i.test(String(productError.message || ''))) {
        productSupportsSizes = false;
        ({ data: productData, error: productError } = await supabaseClient
          .from('products')
          .select('stock, status')
          .eq('id', productId)
          .maybeSingle());
      }

      if (productError) {
        console.warn('Failed to load product stock', productError.message);
        return false;
      }
      if (productData?.status === 'draft') {
        return false;
      }

      const sizes = normalizeSizeList(productData);
      if (sizes.length > 0 && !selectedSize) {
        const tr = window.__i18nTr || (() => 'Please choose a size.');
        showThemeAlert(tr('choose_size_required'));
        return false;
      }

      let data = null;
      let error = null;
      ({ data, error } = await supabaseClient
        .from('cart_items')
        .select(cartSupportsSize ? 'id, quantity, size' : 'id, quantity')
        .eq('user_id', userId)
        .eq('product_id', productId)
        .order('created_at', { ascending: false }));

      if (error && /size/i.test(String(error.message || ''))) {
        cartSupportsSize = false;
        ({ data, error } = await supabaseClient
          .from('cart_items')
          .select('id, quantity')
          .eq('user_id', userId)
          .eq('product_id', productId)
          .order('created_at', { ascending: false }));
      }

      if (error && error.code !== 'PGRST116') {
        console.warn('Failed to check cart', error.message);
        return false;
      }

      const rows = Array.isArray(data) ? data : [];
      const totalInCart = rows.reduce((sum, item) => sum + Number(item.quantity || 0), 0);
      const matched = rows.find((item) => ((item.size || '') === (selectedSize || '')) || (!cartSupportsSize));
      const stock = Number(productData?.stock);
      const hasStock = Number.isFinite(stock) && stock >= 0;
      if (hasStock && (totalInCart + qty) > stock) {
          const trf = window.__i18nTrf || ((_, params) => `Stok produk tidak cukup. Maksimal ${params.stock}.`);
          showThemeAlert(trf('stock_max', { stock }));
          return false;
      }

      if (matched?.id) {
        const next = Number(matched.quantity || 0) + qty;
        const { error: updateError } = await supabaseClient
          .from('cart_items')
          .update({ quantity: next })
          .eq('id', matched.id);
        if (updateError) {
          console.warn('Failed to update cart', updateError.message);
          return false;
        }
        return true;
      }

      if (hasStock && stock < qty) {
        const tr = window.__i18nTr || (() => 'Stok produk tidak cukup.');
        showThemeAlert(tr('stock_not_enough'));
        return false;
      }

      const { error: insertError } = await supabaseClient
        .from('cart_items')
        .insert(cartSupportsSize
          ? { user_id: userId, product_id: productId, size: selectedSize || null, quantity: qty }
          : { user_id: userId, product_id: productId, quantity: qty });

      if (insertError) {
        console.warn('Failed to add to cart', insertError.message);
        return false;
      }
      return true;
    }

    if (productGrid) {
      productGrid.addEventListener('click', (event) => {
        const button = event.target.closest('.btn-add-cart');
        if (button) {
          event.stopPropagation();
          const productId = button.dataset.productId;
          openAddCartModal(productId);
          return;
        }
        const card = event.target.closest('.product-card[data-product-id]');
        if (!card) return;
        goToProductDetail(card.dataset.productId);
      });
    }

    if (addCartQtyMinus) {
      addCartQtyMinus.addEventListener('click', () => {
        selectedAddCartQty = Math.max(1, selectedAddCartQty - 1);
        if (addCartQtyValue) addCartQtyValue.textContent = String(selectedAddCartQty);
      });
    }

    if (addCartQtyPlus) {
      addCartQtyPlus.addEventListener('click', () => {
        const stock = Number(selectedAddCartProduct?.stock);
        if (Number.isFinite(stock) && stock >= 0 && selectedAddCartQty >= stock) {
          const trf = window.__i18nTrf || ((_, params) => `Stok produk tidak cukup. Maksimal ${params.stock}.`);
          showThemeAlert(trf('stock_max', { stock }));
          return;
        }
        selectedAddCartQty += 1;
        if (addCartQtyValue) addCartQtyValue.textContent = String(selectedAddCartQty);
      });
    }

    if (addCartClose) {
      addCartClose.addEventListener('click', () => setAddCartModalOpen(false));
    }

    if (addCartModal) {
      addCartModal.addEventListener('click', (event) => {
        if (event.target === addCartModal) setAddCartModalOpen(false);
      });
    }

    if (addCartConfirm) {
      addCartConfirm.addEventListener('click', async () => {
        if (!selectedAddCartProduct?.id) return;
        const stock = Number(selectedAddCartProduct?.stock);
        if (Number.isFinite(stock) && stock >= 0 && selectedAddCartQty > stock) {
          const trf = window.__i18nTrf || ((_, params) => `Stok produk tidak cukup. Maksimal ${params.stock}.`);
          showThemeAlert(trf('stock_max', { stock }));
          return;
        }
        const size = addCartSize && !addCartSize.disabled ? addCartSize.value : null;
        const ok = await addToCart(selectedAddCartProduct.id, selectedAddCartQty, size);
        if (ok) setAddCartModalOpen(false);
      });
    }

    if (supabaseClient && cartBadge) {
      const userId = getUserId();
      if (userId) {
        fetchCartCount();
        supabaseClient
          .channel(`public:cart_items:${userId}`)
          .on('postgres_changes', { event: '*', schema: 'public', table: 'cart_items', filter: `user_id=eq.${userId}` }, fetchCartCount)
          .subscribe();
      }
    }
  </script>
  <script src="i18n-global.js"></script>
  <script src="loading-indicator.js"></script>
</body>
</html>
