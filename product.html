<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard | Products</title>

  <!-- GLOBAL DASHBOARD STYLE -->
  <link rel="stylesheet" href="dashboard.css">

  <!-- PRODUCTS PAGE STYLE -->
  <link rel="stylesheet" href="product.css">

  <!-- FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h1 class="brand">ArshaApparel</h1>

    <nav>
      <a href="index.html">Home</a>
      <a href="dashboard.html">Dashboard</a>
      <a class="active">Products</a>
      <a href="orders.html">Orders</a>
      <a href="payments.html">Payments</a>
      <a href="login.html" class="logout">Logout</a>
    </nav>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- TOPBAR -->
    <header class="topbar">
      <div>
        <h2>Products</h2>
        <p class="welcome">Manage your product catalog</p>
      </div>

      <div class="top-actions">
        <button class="btn-add"><span class="btn-icon">+</span> <span id="addProductText">Add Product</span></button>
        <button class="menu-toggle" id="menuToggle" type="button" aria-label="Open menu">?</button>
      </div>
    </header>

    <!-- PRODUCTS CONTENT -->
    <section class="products-card">
      <table class="products-table">
        <thead>
          <tr>
            <th>Product</th>
            <th>Category</th>
            <th>Status</th>
            <th>Stock</th>
            <th>Price</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody id="productsBody">
  <tr>
    <td colspan="6">Loading products...</td>
  </tr>
</tbody>
      </table>
    </section>

    <div class="modal" id="productModal" aria-hidden="true">
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-header">
          <h3 id="modalTitle">Add Product</h3>
          <button class="icon-close" id="closeModal" type="button" aria-label="Close">×</button>
        </div>
        <form id="productForm" novalidate>
          <input type="hidden" id="productId">
          <div class="form-grid">
            <label class="form-field">
              <span>Product Name</span>
              <input id="productName" type="text" placeholder="Product name" required>
              <small class="field-error alert-box" id="nameError">Name is required.</small>
            </label>
            <label class="form-field form-field-full">
              <span id="productDescriptionLabel">Description</span>
              <textarea id="productDescription" rows="3" placeholder="Product description"></textarea>
            </label>
            <label class="form-field">
              <span>Category</span>
              <div class="select-wrap category-select-wrap" id="productCategoryWrap">
                <button class="category-toggle" id="productCategoryToggle" type="button" aria-expanded="false">
                  <span class="category-label" id="productCategoryLabel">Select category</span>
                  <span class="category-caret"></span>
                </button>
                <div class="category-dropdown" id="productCategoryDropdown">
                  <button class="category-option is-active" type="button" data-value="">All Category</button>
                  <button class="category-option" type="button" data-value="shirt">Shirt</button>
                  <button class="category-option" type="button" data-value="t-shirt">T-shirt</button>
                  <button class="category-option" type="button" data-value="jacket">Jacket</button>
                  <button class="category-option" type="button" data-value="hoodie">Hoodie</button>
                  <button class="category-option" type="button" data-value="shoes">Shoes</button>
                  <button class="category-option" type="button" data-value="socks">Socks</button>
                  <button class="category-option" type="button" data-value="sandals">Sandals</button>
                  <button class="category-option" type="button" data-value="pants">Pants</button>
                </div>
                <select id="productCategory">
                  <option value="" selected>Select category</option>
                  <option value="shirt">Shirt</option>
                  <option value="t-shirt">T-shirt</option>
                  <option value="jacket">Jacket</option>
                  <option value="hoodie">Hoodie</option>
                  <option value="shoes">Shoes</option>
                  <option value="socks">Socks</option>
                  <option value="sandals">Sandals</option>
                  <option value="pants">Pants</option>
                </select>
              </div>
            </label>
            <label class="form-field form-field-full">
              <span id="productSizeLabel">Available Sizes</span>
              <div class="size-options" id="productSizeOptions"></div>
              <small class="help-text" id="productSizeHint">Select sizes based on category.</small>
            </label>
            <label class="form-field">
              <span>Price</span>
              <div class="number-field">
                <input id="productPrice" type="number" step="0.01" min="0" placeholder="0.00" required>
                <div class="stepper-group">
                  <button class="stepper" type="button" data-target="productPrice" data-step="1" aria-label="Increase price">+</button>
                  <button class="stepper" type="button" data-target="productPrice" data-step="-1" aria-label="Decrease price">-</button>
                </div>
              </div>
              <small class="field-error alert-box" id="priceError">Price is required.</small>
            </label>
            <label class="form-field">
              <span>Stock</span>
              <div class="number-field">
                <input id="productStock" type="number" step="1" min="0" placeholder="0">
                <div class="stepper-group">
                  <button class="stepper" type="button" data-target="productStock" data-step="1" aria-label="Increase stock">+</button>
                  <button class="stepper" type="button" data-target="productStock" data-step="-1" aria-label="Decrease stock">-</button>
                </div>
              </div>
            </label>
            <label class="form-field">
              <span>Status</span>
              <div class="select-wrap status-select-wrap" id="productStatusWrap">
                <button class="category-toggle" id="productStatusToggle" type="button" aria-expanded="false">
                  <span class="category-label" id="productStatusLabel">Active</span>
                  <span class="category-caret"></span>
                </button>
                <div class="category-dropdown" id="productStatusDropdown">
                  <button class="category-option is-active" type="button" data-value="active">Active</button>
                  <button class="category-option" type="button" data-value="out">Out</button>
                  <button class="category-option" type="button" data-value="draft">Draft</button>
                </div>
                <select id="productStatus">
                  <option value="active">Active</option>
                  <option value="out">Out</option>
                  <option value="draft">Draft</option>
                </select>
              </div>
            </label>
            <label class="form-field">
              <span>Upload Image</span>
              <input id="productImageFile" type="file" accept="image/*,video/*" multiple>
              <small class="help-text" id="imageHint">Choose one or more files to replace current images.</small>
            </label>
            <div class="image-preview" id="imagePreview">
              <div class="media-preview-list" id="mediaPreviewList"></div>
              <button class="remove-image" id="removeImageBtn" type="button">Hapus file</button>
            </div>
          </div>
          <div class="form-alert alert-box" id="formAlert" role="alert" aria-live="polite">
            Please fill out required fields.
          </div>
          <div class="modal-actions">
            <button class="btn-add" type="submit" id="saveBtn">Save Product</button>
          </div>
        </form>
      </div>
    </div>

  </main>
</div>
<div class="nav-overlay" id="navOverlay"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="supabase-init.js"></script>
<script src="currency-converter.js"></script>
<script>
  const productsBody = document.getElementById('productsBody');
  const supabaseClient = window.supabaseClient;
  const addButton = document.querySelector('.btn-add');
  const modal = document.getElementById('productModal');
  const closeModalBtn = document.getElementById('closeModal');
  const modalTitle = document.getElementById('modalTitle');
  const productForm = document.getElementById('productForm');
  const productIdInput = document.getElementById('productId');
  const productNameInput = document.getElementById('productName');
  const productDescriptionInput = document.getElementById('productDescription');
  const productCategoryInput = document.getElementById('productCategory');
  const productCategoryWrap = document.getElementById('productCategoryWrap');
  const productCategoryToggle = document.getElementById('productCategoryToggle');
  const productCategoryDropdown = document.getElementById('productCategoryDropdown');
  const productCategoryLabel = document.getElementById('productCategoryLabel');
  const productSizeOptions = document.getElementById('productSizeOptions');
  const productSizeHint = document.getElementById('productSizeHint');
  const productPriceInput = document.getElementById('productPrice');
  const productStockInput = document.getElementById('productStock');
  const productStatusInput = document.getElementById('productStatus');
  const productStatusWrap = document.getElementById('productStatusWrap');
  const productStatusToggle = document.getElementById('productStatusToggle');
  const productStatusDropdown = document.getElementById('productStatusDropdown');
  const productStatusLabel = document.getElementById('productStatusLabel');
  const productImageFileInput = document.getElementById('productImageFile');
  const imageHint = document.getElementById('imageHint');
  const imagePreview = document.getElementById('imagePreview');
  const mediaPreviewList = document.getElementById('mediaPreviewList');
  const removeImageBtn = document.getElementById('removeImageBtn');
  const formAlert = document.getElementById('formAlert');
  const nameError = document.getElementById('nameError');
  const priceError = document.getElementById('priceError');
  const productsCache = new Map();
  let currentImageUrls = [];
  let previewObjectUrls = [];
  let stagedFiles = [];
  let removeImage = false;
  let supportsDescription = true;
  let supportsImages = true;
  let supportsSizes = true;
  let selectedSizes = [];

  const CATEGORY_SIZE_OPTIONS = {
    shirt: ['XS', 'S', 'M', 'L', 'XL', 'XXL'],
    't-shirt': ['XS', 'S', 'M', 'L', 'XL', 'XXL'],
    jacket: ['S', 'M', 'L', 'XL', 'XXL'],
    hoodie: ['S', 'M', 'L', 'XL', 'XXL'],
    pants: ['28', '30', '32', '34', '36', '38'],
    shoes: ['38', '39', '40', '41', '42', '43', '44'],
    sandals: ['38', '39', '40', '41', '42', '43'],
    socks: ['S-M', 'L-XL']
  };

  function showFormAlert(message) {
    if (!formAlert) return;
    formAlert.textContent = message || '';
    formAlert.classList.add('show');
  }

  function hideFormAlert() {
    if (!formAlert) return;
    formAlert.classList.remove('show');
  }

  function normalizeRequestError(error, fallbackMessage) {
    const message = String(error?.message || '').trim();
    if (!message) return fallbackMessage;
    if (/failed to fetch/i.test(message)) {
      if (window.location.protocol === 'file:') {
        return 'Failed to fetch: jalankan project via http://localhost (mis. Live Server), bukan file://';
      }
      return 'Failed to fetch: cek koneksi internet, URL Supabase, API key, dan CORS project Supabase.';
    }
    return message;
  }

  function formatPrice(value) {
    const number = Number(value);
    if (Number.isNaN(number)) return value || '-';
    return (window.currencyService && window.currencyService.formatFromIDR)
      ? window.currencyService.formatFromIDR(number)
      : number;
  }

  function statusClass(status) {
    const value = (status || '').toLowerCase();
    if (value === 'active') return 'success';
    if (value === 'out') return 'warning';
    if (value === 'draft') return 'info';
    return 'info';
  }

  function renderRows(products) {
    if (!productsBody) return;
    if (!products || products.length === 0) {
      const tr = window.__i18nTr || (() => 'No products found.');
      productsBody.innerHTML = `
        <tr>
          <td colspan="6">${tr('no_products_found')}</td>
        </tr>
      `;
      return;
    }

    productsCache.clear();
    products.forEach(product => productsCache.set(product.id, product));
    const tr = window.__i18nTr || ((key) => key);
    const categoryKey = window.__i18nCategoryKey || (() => null);
    const statusKey = window.__i18nStatusKey || (() => null);

    productsBody.innerHTML = products.map(product => `
      <tr>
        <td>${product.name}</td>
        <td>${(function () {
          const key = categoryKey(product.category);
          return key ? tr(key) : (product.category || '-');
        })()}</td>
        <td><span class="badge ${statusClass(product.status)}">${(function () {
          const key = statusKey(product.status);
          return key ? tr(key) : (product.status || '-');
        })()}</span></td>
        <td>${product.stock ?? '-'}</td>
        <td>${formatPrice(product.price)}</td>
        <td>
          <div class="action-buttons">
            <button class="action-btn edit" type="button" data-id="${product.id}">
              <span class="action-icon">E</span>
              ${tr('edit')}
            </button>
            <button class="action-btn danger" type="button" data-id="${product.id}">
              <span class="action-icon">D</span>
              ${tr('delete')}
            </button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  async function fetchProducts() {
    if (!supabaseClient) return;
    const runFetch = (selectColumns) => supabaseClient
      .from('products')
      .select(selectColumns)
      .order('created_at', { ascending: false });

    let data = null;
    let error = null;
    ({ data, error } = await runFetch('id, name, description, image, images, sizes, price, category, status, stock'));

    if (error && /description/i.test(String(error.message || ''))) {
      supportsDescription = false;
      ({ data, error } = await runFetch('id, name, image, images, sizes, price, category, status, stock'));
    }

    if (error && /images/i.test(String(error.message || ''))) {
      supportsImages = false;
      ({ data, error } = await runFetch('id, name, description, image, sizes, price, category, status, stock'));
    }

    if (error && /sizes/i.test(String(error.message || ''))) {
      supportsSizes = false;
      ({ data, error } = await runFetch('id, name, description, image, images, price, category, status, stock'));
    }

    if (error && /(description|images|sizes)/i.test(String(error.message || ''))) {
      supportsDescription = false;
      supportsImages = false;
      supportsSizes = false;
      ({ data, error } = await runFetch('id, name, image, price, category, status, stock'));
    }

    if (error) {
      console.warn('Failed to load products', error.message);
      return;
    }

    if (Array.isArray(data)) {
      data = data.map((item) => ({
        ...item,
        description: item.description || null,
        images: item.images || null,
        sizes: item.sizes || null
      }));
    }

    renderRows(data);
  }

  function openModal(mode, product) {
    if (!modal) return;
    const tr = window.__i18nTr || ((key) => key);
    modal.classList.add('is-open');
    modal.setAttribute('aria-hidden', 'false');
    modalTitle.textContent = mode === 'edit' ? tr('edit_product') : tr('add_product');
    productIdInput.value = product?.id || '';
    productNameInput.value = product?.name || '';
    productDescriptionInput.value = product?.description || '';
    productCategoryInput.value = product?.category || '';
    productPriceInput.value = product?.price ?? '';
    productStockInput.value = product?.stock ?? '';
    productStatusInput.value = product?.status || 'active';
    selectedSizes = normalizeSizeList(product);
    currentImageUrls = normalizeImageList(product);
    stagedFiles = [];
    removeImage = false;
    if (productImageFileInput) productImageFileInput.value = '';
    renderPreviewList();
    if (imageHint) {
      imageHint.textContent = currentImageUrls.length > 0
        ? `${tr('current_image_set')} (${currentImageUrls.length})`
        : tr('no_image_yet');
    }
    hideFormAlert();
    syncCategoryDropdown();
    syncStatusDropdown();
    renderSizeOptions();
  }

  function closeModal() {
    if (!modal) return;
    modal.classList.remove('is-open');
    modal.setAttribute('aria-hidden', 'true');
    productForm.reset();
    productIdInput.value = '';
    currentImageUrls = [];
    stagedFiles = [];
    removeImage = false;
    selectedSizes = [];
    renderPreviewList();
    hideFormAlert();
  }

  function clearPreviewObjectUrls() {
    previewObjectUrls.forEach((url) => URL.revokeObjectURL(url));
    previewObjectUrls = [];
  }

  function renderPreviewList() {
    if (!imagePreview || !mediaPreviewList) return;
    clearPreviewObjectUrls();

    let previewItems = [];
    if (stagedFiles.length > 0) {
      previewItems = stagedFiles.map((file, index) => {
        const url = URL.createObjectURL(file);
        previewObjectUrls.push(url);
        return {
          url,
          type: file.type.startsWith('video/') ? 'video' : 'image',
          index,
          source: 'staged'
        };
      });
    } else if (!removeImage && currentImageUrls.length > 0) {
      previewItems = currentImageUrls.map((url, index) => ({
        url,
        type: isVideoUrl(url) ? 'video' : 'image',
        index,
        source: 'existing'
      }));
    }

    if (previewItems.length === 0) {
      mediaPreviewList.innerHTML = '';
      imagePreview.classList.remove('show');
      return;
    }

    mediaPreviewList.innerHTML = previewItems.map((item, index) => `
      <div class="media-preview-item">
        ${item.type === 'video'
          ? `<video class="media-preview-el" src="${item.url}" muted playsinline controls preload="metadata"></video>`
          : `<img class="media-preview-el" src="${item.url}" alt="Preview ${index + 1}">`}
        ${index === 0 ? '<span class="media-preview-badge">Cover</span>' : ''}
        <button class="media-preview-remove" type="button" data-source="${item.source}" data-index="${item.index}" aria-label="Remove file">x</button>
      </div>
    `).join('');
    imagePreview.classList.add('show');
  }

  function getStoragePathFromUrl(url) {
    if (!url) return null;
    const marker = '/storage/v1/object/public/product-images/';
    const index = url.indexOf(marker);
    if (index === -1) return null;
    return url.slice(index + marker.length);
  }

  function normalizeImageList(product) {
    if (!product) return [];
    if (Array.isArray(product.images)) {
      return product.images.filter((url) => typeof url === 'string' && url.trim());
    }
    if (typeof product.images === 'string') {
      try {
        const parsed = JSON.parse(product.images);
        if (Array.isArray(parsed)) {
          return parsed.filter((url) => typeof url === 'string' && url.trim());
        }
      } catch (error) {}
    }
    if (product.image && typeof product.image === 'string') return [product.image];
    return [];
  }

  function normalizeSizeList(product) {
    if (!product) return [];
    if (Array.isArray(product.sizes)) {
      return product.sizes.filter((value) => typeof value === 'string' && value.trim());
    }
    if (typeof product.sizes === 'string') {
      try {
        const parsed = JSON.parse(product.sizes);
        if (Array.isArray(parsed)) {
          return parsed.filter((value) => typeof value === 'string' && value.trim());
        }
      } catch (error) {}
    }
    return [];
  }

  function getCategorySizes(categoryValue) {
    const key = String(categoryValue || '').toLowerCase();
    return CATEGORY_SIZE_OPTIONS[key] || [];
  }

  function renderSizeOptions() {
    if (!productSizeOptions) return;
    const options = getCategorySizes(productCategoryInput?.value);
    if (options.length === 0) {
      productSizeOptions.innerHTML = '';
      selectedSizes = [];
      if (productSizeHint) {
        productSizeHint.textContent = 'No size options for this category.';
      }
      return;
    }

    selectedSizes = selectedSizes.filter((size) => options.includes(size));
    if (selectedSizes.length === 0) {
      selectedSizes = options.slice();
    }
    productSizeOptions.innerHTML = options.map((size) => `
      <label class="size-option">
        <input type="checkbox" class="size-check" value="${size}" ${selectedSizes.includes(size) ? 'checked' : ''}>
        <span>${size}</span>
      </label>
    `).join('');
    if (productSizeHint) {
      productSizeHint.textContent = `${selectedSizes.length} size(s) selected.`;
    }
  }

  function syncSelectedSizesFromUI() {
    if (!productSizeOptions) return;
    selectedSizes = Array.from(productSizeOptions.querySelectorAll('.size-check:checked'))
      .map((input) => input.value)
      .filter(Boolean);
    if (productSizeHint) {
      productSizeHint.textContent = selectedSizes.length > 0
        ? `${selectedSizes.length} size(s) selected.`
        : 'Select at least one size.';
    }
  }

  function isVideoUrl(url) {
    return /\.(mp4|webm|ogg|mov|m4v)$/i.test(String(url || ''));
  }

  function isSameValue(prev, next) {
    if (Array.isArray(prev) || Array.isArray(next)) {
      const a = Array.isArray(prev) ? prev : [];
      const b = Array.isArray(next) ? next : [];
      return JSON.stringify(a) === JSON.stringify(b);
    }
    return (prev ?? null) === (next ?? null);
  }

  async function saveProduct(event) {
    event.preventDefault();
    if (!supabaseClient) {
      showFormAlert('Supabase client is not available.');
      return;
    }

    if (!validateForm()) {
      return;
    }
    syncSelectedSizesFromUI();

    const files = stagedFiles.slice();
    let imageUrls = currentImageUrls.slice();
    if (files.length > 0) {
      const uploadedUrls = [];
      for (const file of files) {
        const extension = file.name.split('.').pop();
        const unique = (window.crypto?.randomUUID?.() || Math.random().toString(36).slice(2));
        const filePath = `products/${Date.now()}-${unique}.${extension}`;
        const { error: uploadError } = await supabaseClient
          .storage
          .from('product-images')
          .upload(filePath, file, { upsert: true });

        if (uploadError) {
          console.warn('Failed to upload image', uploadError.message);
          showFormAlert(normalizeRequestError(uploadError, 'Failed to upload image.'));
          return;
        }

        const { data: publicData } = supabaseClient
          .storage
          .from('product-images')
          .getPublicUrl(filePath);
        if (publicData?.publicUrl) uploadedUrls.push(publicData.publicUrl);
      }
      imageUrls = uploadedUrls;
    }

    if (removeImage && files.length === 0) {
      imageUrls = [];
    }
    const imageUrl = imageUrls[0] || null;

    const nextData = {
      name: productNameInput.value.trim(),
      category: productCategoryInput.value || null,
      price: Number(productPriceInput.value),
      stock: productStockInput.value === '' ? null : Number(productStockInput.value),
      status: productStatusInput.value,
      image: imageUrl
    };
    if (supportsImages) {
      nextData.images = imageUrls;
    }
    if (supportsSizes) {
      nextData.sizes = selectedSizes.slice();
    }
    if (supportsDescription) {
      nextData.description = productDescriptionInput.value.trim() || null;
    }

    const id = productIdInput.value;
    const isEdit = Boolean(id);
    const existing = isEdit ? (productsCache.get(id) || {}) : null;
    let payload = nextData;

    if (isEdit) {
      payload = {};
      Object.keys(nextData).forEach((key) => {
        const prev = existing && Object.prototype.hasOwnProperty.call(existing, key) ? existing[key] : null;
        const next = nextData[key];
        if (!isSameValue(prev, next)) {
          payload[key] = next;
        }
      });
      if (Object.keys(payload).length === 0) {
        closeModal();
        return;
      }
    }

    const runSave = () => (
      isEdit
        ? supabaseClient.from('products').update(payload).eq('id', id)
        : supabaseClient.from('products').insert(payload)
    );

    let { error } = await runSave();

    if (error && /description/i.test(String(error.message || ''))) {
      supportsDescription = false;
      delete payload.description;
      if (isEdit && Object.keys(payload).length === 0) {
        error = null;
      } else {
        ({ error } = await runSave());
      }
    }

    if (error && /images/i.test(String(error.message || ''))) {
      supportsImages = false;
      delete payload.images;
      if (isEdit && Object.keys(payload).length === 0) {
        error = null;
      } else {
        ({ error } = await runSave());
      }
    }

    if (error && /sizes/i.test(String(error.message || ''))) {
      supportsSizes = false;
      delete payload.sizes;
      if (isEdit && Object.keys(payload).length === 0) {
        error = null;
      } else {
        ({ error } = await runSave());
      }
    }

    if (error) {
      console.warn('Failed to save product', error.message);
      showFormAlert(normalizeRequestError(error, 'Failed to save product.'));
      return;
    }

    if (removeImage || files.length > 0) {
      const previousUrls = currentImageUrls.slice();
      const currentSet = new Set(imageUrls);
      const removedPaths = previousUrls
        .filter((url) => !currentSet.has(url))
        .map(getStoragePathFromUrl)
        .filter(Boolean);
      if (removedPaths.length > 0) {
        await supabaseClient.storage.from('product-images').remove(removedPaths);
      }
    }

    closeModal();
  }

  async function deleteProduct(id) {
    if (!supabaseClient || !id) return;
    const existing = productsCache.get(id);
    const { error } = await supabaseClient.from('products').delete().eq('id', id);
    if (error) {
      console.warn('Failed to delete product', error.message);
      return;
    }

    const existingUrls = normalizeImageList(existing);
    const paths = existingUrls.map(getStoragePathFromUrl).filter(Boolean);
    if (paths.length > 0) {
      await supabaseClient.storage.from('product-images').remove(paths);
    }
  }

  if (supabaseClient) {
    fetchProducts();
    supabaseClient
      .channel('public:products')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'products' }, fetchProducts)
      .subscribe();
  }

  window.addEventListener('currency:updated', fetchProducts);

  if (addButton) {
    addButton.addEventListener('click', () => openModal('add'));
  }

  if (productsBody) {
    productsBody.addEventListener('click', (event) => {
      const editBtn = event.target.closest('.action-btn.edit');
      const deleteBtn = event.target.closest('.action-btn.danger');
      if (editBtn) {
        const product = productsCache.get(editBtn.dataset.id);
        openModal('edit', product);
      }
      if (deleteBtn) {
        const id = deleteBtn.dataset.id;
        const tr = window.__i18nTr || (() => 'Delete this product?');
        if (id && window.confirm(tr('delete_product_confirm'))) {
          deleteProduct(id);
        }
      }
    });
  }

  if (closeModalBtn) closeModalBtn.addEventListener('click', closeModal);
  if (modal) {
    modal.addEventListener('click', (event) => {
      if (event.target === modal) closeModal();
    });
  }
  if (productForm) productForm.addEventListener('submit', saveProduct);

  if (productImageFileInput) {
    productImageFileInput.addEventListener('change', () => {
      const pickedFiles = Array.from(productImageFileInput.files || []);
      if (pickedFiles.length === 0) return;

      const isEditMode = Boolean(productIdInput?.value);
      if (isEditMode) {
        stagedFiles = pickedFiles;
      } else {
        stagedFiles = stagedFiles.concat(pickedFiles);
      }
      removeImage = false;
      renderPreviewList();
      if (imageHint) {
        imageHint.textContent = `${stagedFiles.length} file(s) selected. First file will be used as cover.`;
      }
      productImageFileInput.value = '';
    });
  }

  if (mediaPreviewList) {
    mediaPreviewList.addEventListener('click', (event) => {
      const removeBtn = event.target.closest('.media-preview-remove');
      if (!removeBtn) return;
      const index = Number(removeBtn.dataset.index);
      const source = removeBtn.dataset.source;
      if (Number.isNaN(index) || index < 0) return;

      if (source === 'staged') {
        stagedFiles.splice(index, 1);
      } else if (source === 'existing') {
        currentImageUrls.splice(index, 1);
      }

      if (stagedFiles.length === 0 && currentImageUrls.length === 0) {
        removeImage = true;
        if (imageHint) imageHint.textContent = 'No image selected.';
      } else {
        removeImage = false;
        if (imageHint) {
          const total = stagedFiles.length > 0 ? stagedFiles.length : currentImageUrls.length;
          imageHint.textContent = `${total} file(s) selected. First file will be used as cover.`;
        }
      }
      renderPreviewList();
    });
  }

  if (removeImageBtn) {
    removeImageBtn.addEventListener('click', () => {
      removeImage = true;
      currentImageUrls = [];
      stagedFiles = [];
      if (productImageFileInput) productImageFileInput.value = '';
      renderPreviewList();
      if (imageHint) {
        imageHint.textContent = 'No image selected.';
      }
    });
  }

  function syncCategoryDropdown() {
    if (!productCategoryInput || !productCategoryLabel || !productCategoryDropdown) return;
    const currentValue = productCategoryInput.value || '';
    const currentOption = Array.from(productCategoryInput.options).find(option => option.value === currentValue);
    productCategoryLabel.textContent = currentOption?.textContent || 'Select category';
    productCategoryDropdown.querySelectorAll('.category-option').forEach((option) => {
      option.classList.toggle('is-active', option.dataset.value === currentValue);
    });
  }

  function syncStatusDropdown() {
    if (!productStatusInput || !productStatusLabel || !productStatusDropdown) return;
    const currentValue = productStatusInput.value || 'active';
    const currentOption = Array.from(productStatusInput.options).find(option => option.value === currentValue);
    productStatusLabel.textContent = currentOption?.textContent || 'Active';
    productStatusDropdown.querySelectorAll('.category-option').forEach((option) => {
      option.classList.toggle('is-active', option.dataset.value === currentValue);
    });
  }

  function setCategoryOpen(open) {
    if (!productCategoryWrap || !productCategoryToggle || !productCategoryDropdown) return;
    productCategoryWrap.classList.toggle('is-open', open);
    productCategoryToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
  }

  function setStatusOpen(open) {
    if (!productStatusWrap || !productStatusToggle || !productStatusDropdown) return;
    productStatusWrap.classList.toggle('is-open', open);
    productStatusToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
  }

  if (productCategoryToggle) {
    productCategoryToggle.addEventListener('click', () => {
      const open = productCategoryWrap?.classList.contains('is-open');
      setCategoryOpen(!open);
    });
  }

  if (productCategoryDropdown) {
    productCategoryDropdown.addEventListener('click', (event) => {
      const option = event.target.closest('.category-option');
      if (!option || !productCategoryInput) return;
      productCategoryInput.value = option.dataset.value || '';
      productCategoryInput.dispatchEvent(new Event('change', { bubbles: true }));
      syncCategoryDropdown();
      setCategoryOpen(false);
    });
  }

  if (productStatusToggle) {
    productStatusToggle.addEventListener('click', () => {
      const open = productStatusWrap?.classList.contains('is-open');
      setStatusOpen(!open);
    });
  }

  if (productStatusDropdown) {
    productStatusDropdown.addEventListener('click', (event) => {
      const option = event.target.closest('.category-option');
      if (!option || !productStatusInput) return;
      productStatusInput.value = option.dataset.value || 'active';
      productStatusInput.dispatchEvent(new Event('change', { bubbles: true }));
      syncStatusDropdown();
      setStatusOpen(false);
    });
  }

  function setFieldError(input, errorEl, message) {
    const field = input.closest('.form-field');
    if (message) {
      field.classList.add('invalid');
      errorEl.textContent = message;
      errorEl.classList.add('show');
      return false;
    }
    field.classList.remove('invalid');
    errorEl.classList.remove('show');
    return true;
  }

  function validateForm() {
    let valid = true;
    const tr = window.__i18nTr || ((key) => {
      if (key === 'required_fields') return 'Please fill out required fields.';
      if (key === 'name_required') return 'Name is required.';
      if (key === 'price_required') return 'Price is required.';
      return key;
    });
    if (!productNameInput.value.trim()) {
      valid = setFieldError(productNameInput, nameError, tr('name_required')) && valid;
    } else {
      setFieldError(productNameInput, nameError, '');
    }

    if (!productPriceInput.value.trim()) {
      valid = setFieldError(productPriceInput, priceError, tr('price_required')) && valid;
    } else {
      setFieldError(productPriceInput, priceError, '');
    }

    if (formAlert) {
      if (!valid) {
        showFormAlert(tr('required_fields'));
      } else {
        hideFormAlert();
      }
    }
    return valid;
  }

  [productNameInput, productPriceInput].forEach((input) => {
    input.addEventListener('input', validateForm);
  });

  if (productCategoryInput) {
    productCategoryInput.addEventListener('change', () => {
      syncCategoryDropdown();
      renderSizeOptions();
    });
  }

  if (productSizeOptions) {
    productSizeOptions.addEventListener('change', (event) => {
      if (!event.target.classList.contains('size-check')) return;
      syncSelectedSizesFromUI();
    });
  }

  document.addEventListener('click', (event) => {
    if (productCategoryWrap && !productCategoryWrap.contains(event.target)) {
      setCategoryOpen(false);
    }
    if (productStatusWrap && !productStatusWrap.contains(event.target)) {
      setStatusOpen(false);
    }
  });

  if (productStatusInput) {
    productStatusInput.addEventListener('change', syncStatusDropdown);
  }

  document.querySelectorAll('.stepper').forEach((button) => {
    button.addEventListener('click', () => {
      const targetId = button.dataset.target;
      const input = document.getElementById(targetId);
      if (!input) return;
      if (input.value === '') input.value = '0';
      const step = Number(button.dataset.step || 1);
      if (step > 0) {
        input.stepUp();
      } else {
        input.stepDown();
      }
      input.dispatchEvent(new Event('input', { bubbles: true }));
    });
  });

  const menuToggle = document.getElementById('menuToggle');
  const navOverlay = document.getElementById('navOverlay');

  function setNavOpen(open) {
    document.body.classList.toggle('nav-open', open);
  }

  if (menuToggle) {
    menuToggle.addEventListener('click', () => {
      setNavOpen(!document.body.classList.contains('nav-open'));
    });
  }

  if (navOverlay) {
    navOverlay.addEventListener('click', () => setNavOpen(false));
  }

  document.addEventListener('keydown', (event) => {
    if (event.key === 'Escape') setNavOpen(false);
  });

  window.addEventListener('resize', () => {
    if (window.innerWidth > 900) setNavOpen(false);
  });
</script>
  <script src="i18n-global.js"></script>
  <script src="loading-indicator.js"></script>
</body>
</html>
