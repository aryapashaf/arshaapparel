<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard</title>

  <link rel="stylesheet" href="dashboard.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h1 class="brand">ArshaApparel</h1>

    <nav>
      <a href="index.html">Home</a>
      <a class="active">Dashboard</a>
      <a href="product.html">Products</a>
      <a href="orders.html">Orders</a>
      <a href="payments.html">Payments</a>
      <a href="login.html" class="logout" id="logoutBtn">Logout</a>
    </nav>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- TOP BAR -->
    <header class="topbar">
      <div>
        <h2>Dashboard</h2>
        <p class="welcome" id="welcomeText">Welcome back.</p>
      </div>

      <div class="user-meta">
        <span class="role-pill role-user" id="rolePill">user</span>
        <div class="top-actions">
          <a class="icon" href="reset.html" aria-label="Reset Data">&#9881;</a>
          <button class="icon" aria-label="Profile" id="userBadge">&#128100;</button>
          <button class="menu-toggle" id="menuToggle" type="button" aria-label="Open menu">&#9776;</button>
        </div>
      </div>
    </header>

    <!-- STATS -->
    <section class="stats">
      <div class="card">
        <p>Total Products</p>
        <h3 id="statTotal">0</h3>
      </div>
      <div class="card">
        <p>Active Products</p>
        <h3 id="statActive">0</h3>
      </div>
      <div class="card">
        <p>Out of Stock</p>
        <h3 id="statOut">0</h3>
      </div>
    </section>

    <section class="sales-card">
      <div class="sales-head">
        <h3 id="salesChartTitle">Sales Overview</h3>
        <div class="sales-filters" role="group" aria-label="Sales range filter">
          <button class="sales-filter-btn" id="salesFilterDay" type="button" data-range="day">Per Day</button>
          <button class="sales-filter-btn is-active" id="salesFilterWeek" type="button" data-range="week">Per Week</button>
          <button class="sales-filter-btn" id="salesFilterYear" type="button" data-range="year">Per Year</button>
        </div>
      </div>
      <p class="sales-total" id="salesTotalText">Total sales: Rp0</p>
      <div class="sales-chart-wrap">
        <svg class="sales-chart" id="salesChartSvg" viewBox="0 0 720 300" preserveAspectRatio="xMidYMid meet" aria-label="Sales chart"></svg>
        <p class="sales-empty" id="salesChartEmpty">No sales data.</p>
      </div>
    </section>

    <!-- TABLE -->
    <section class="table-card">
      <h3>Latest Products</h3>
      <table>
        <thead>
          <tr>
            <th>Product</th>
            <th>Category</th>
            <th>Status</th>
            <th>Stock</th>
            <th>Price</th>
          </tr>
        </thead>
        <tbody id="dashboardProductsBody">
          <tr>
            <td colspan="5">Loading products...</td>
          </tr>
        </tbody>
      </table>
    </section>

  </main>
</div>
<div class="nav-overlay" id="navOverlay"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="supabase-init.js"></script>
<script src="currency-converter.js"></script>
<script>
  const stored = localStorage.getItem('loginInfo') || sessionStorage.getItem('loginInfo');
  const welcomeText = document.getElementById('welcomeText');
  const rolePill = document.getElementById('rolePill');
  const userBadge = document.getElementById('userBadge');
  const logoutBtn = document.getElementById('logoutBtn');
  const statTotal = document.getElementById('statTotal');
  const statActive = document.getElementById('statActive');
  const statOut = document.getElementById('statOut');
  const dashboardProductsBody = document.getElementById('dashboardProductsBody');
  const salesChartSvg = document.getElementById('salesChartSvg');
  const salesChartEmpty = document.getElementById('salesChartEmpty');
  const salesTotalText = document.getElementById('salesTotalText');
  const salesFilterButtons = Array.from(document.querySelectorAll('.sales-filter-btn'));
  const supabaseClient = window.supabaseClient;
  let salesOrders = [];
  let currentSalesRange = 'week';

  if (stored) {
    try {
      const data = JSON.parse(stored);
      const name = data.name || (data.email ? data.email.split('@')[0] : 'User');
      const role = data.role || 'user';
      const trf = window.__i18nTrf || ((_, params) => `Welcome back, ${params.name}.`);

      welcomeText.textContent = trf('welcome_back_name', { name });
      rolePill.textContent = role;
      rolePill.classList.toggle('role-admin', role === 'admin');
      rolePill.classList.toggle('role-user', role !== 'admin');
      userBadge.textContent = role === 'admin' ? 'A' : 'U';
    } catch (error) {
      const tr = window.__i18nTr || (() => 'Welcome back.');
      welcomeText.textContent = tr('welcome_back');
    }
  }

  logoutBtn.addEventListener('click', (event) => {
    event.preventDefault();
    localStorage.removeItem('loginInfo');
    sessionStorage.removeItem('loginInfo');
    window.location.href = 'login.html';
  });

  function formatPrice(value) {
    const number = Number(value);
    if (Number.isNaN(number)) return value || '-';
    return (window.currencyService && window.currencyService.formatFromIDR)
      ? window.currencyService.formatFromIDR(number)
      : number;
  }

  function statusClass(status) {
    const value = (status || '').toLowerCase();
    if (value === 'active') return 'success';
    if (value === 'out') return 'warning';
    if (value === 'draft') return 'info';
    return 'info';
  }

  function renderDashboard(products) {
    if (!dashboardProductsBody) return;
    if (!products || products.length === 0) {
      const tr = window.__i18nTr || (() => 'No products found.');
      dashboardProductsBody.innerHTML = `
        <tr>
          <td colspan="5">${tr('no_products_found')}</td>
        </tr>
      `;
      statTotal.textContent = '0';
      statActive.textContent = '0';
      statOut.textContent = '0';
      return;
    }

    const total = products.length;
    const active = products.filter(item => (item.status || '').toLowerCase() === 'active').length;
    const out = products.filter(item => Number(item.stock) === 0 || (item.status || '').toLowerCase() === 'out').length;

    statTotal.textContent = total;
    statActive.textContent = active;
    statOut.textContent = out;

    const latest = products.slice(0, 5);
    const tr = window.__i18nTr || ((key) => key);
    const categoryKey = window.__i18nCategoryKey || (() => null);
    const statusKey = window.__i18nStatusKey || (() => null);
    dashboardProductsBody.innerHTML = latest.map(product => `
      <tr>
        <td>${product.name}</td>
        <td>${(function () {
          const key = categoryKey(product.category);
          return key ? tr(key) : (product.category || '-');
        })()}</td>
        <td><span class="badge ${statusClass(product.status)}">${(function () {
          const key = statusKey(product.status);
          return key ? tr(key) : (product.status || '-');
        })()}</span></td>
        <td>${product.stock ?? '-'}</td>
        <td>${formatPrice(product.price)}</td>
      </tr>
    `).join('');
  }

  async function fetchDashboardProducts() {
    if (!supabaseClient) return;
    const { data, error } = await supabaseClient
      .from('products')
      .select('id, name, price, category, status, stock')
      .order('created_at', { ascending: false });

    if (error) {
      console.warn('Failed to load products', error.message);
      return;
    }

    renderDashboard(data);
  }

  function formatCompact(value) {
    const number = Number(value || 0);
    if (!Number.isFinite(number)) return '0';
    if (number >= 1000000) return `${(number / 1000000).toFixed(1)}M`;
    if (number >= 1000) return `${(number / 1000).toFixed(1)}K`;
    return `${Math.round(number)}`;
  }

  function getRangeConfig(range) {
    const now = new Date();
    if (range === 'day') {
      const points = [];
      for (let i = 23; i >= 0; i -= 1) {
        const start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), now.getHours() - i, 0, 0, 0);
        const end = new Date(start);
        end.setHours(end.getHours() + 1);
        points.push({
          key: start.toISOString(),
          label: `${String(start.getHours()).padStart(2, '0')}:00`,
          start,
          end,
          value: 0
        });
      }
      return points;
    }

    if (range === 'year') {
      const points = [];
      const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      for (let i = 11; i >= 0; i -= 1) {
        const start = new Date(now.getFullYear(), now.getMonth() - i, 1, 0, 0, 0, 0);
        const end = new Date(start.getFullYear(), start.getMonth() + 1, 1, 0, 0, 0, 0);
        points.push({
          key: `${start.getFullYear()}-${start.getMonth() + 1}`,
          label: monthNames[start.getMonth()],
          start,
          end,
          value: 0
        });
      }
      return points;
    }

    const points = [];
    const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0, 0);
    for (let i = 6; i >= 0; i -= 1) {
      const start = new Date(startOfToday);
      start.setDate(start.getDate() - i);
      const end = new Date(start);
      end.setDate(end.getDate() + 1);
      points.push({
        key: start.toISOString(),
        label: dayNames[start.getDay()],
        start,
        end,
        value: 0
      });
    }
    return points;
  }

  function aggregateSales(range) {
    const buckets = getRangeConfig(range);
    salesOrders.forEach((order) => {
      const createdAt = new Date(order.created_at);
      if (Number.isNaN(createdAt.getTime())) return;
      const amount = Number(order.total || 0);
      if (!Number.isFinite(amount) || amount <= 0) return;
      const bucket = buckets.find((item) => createdAt >= item.start && createdAt < item.end);
      if (bucket) bucket.value += amount;
    });
    return buckets;
  }

  function renderSalesChart() {
    if (!salesChartSvg || !salesChartEmpty || !salesTotalText) return;
    const points = aggregateSales(currentSalesRange);
    const total = points.reduce((sum, point) => sum + point.value, 0);
    const tr = window.__i18nTr || ((key) => key);
    const trf = window.__i18nTrf || ((_, params) => `Total sales: ${params.total}`);
    salesTotalText.textContent = trf('sales_total', { total: formatPrice(total) });

    if (points.length === 0 || total <= 0) {
      salesChartSvg.innerHTML = '';
      salesChartEmpty.textContent = tr('no_sales_data');
      salesChartEmpty.classList.add('show');
      return;
    }

    salesChartEmpty.classList.remove('show');
    const wrap = salesChartSvg.parentElement;
    const width = Math.max(320, Math.floor((wrap ? wrap.clientWidth : 720) - 16));
    const height = Math.max(220, Math.min(360, Math.floor(width * 0.48)));
    const isNarrow = width < 520;
    salesChartSvg.setAttribute('viewBox', `0 0 ${width} ${height}`);

    const padLeft = isNarrow ? 54 : 66;
    const padRight = isNarrow ? 12 : 18;
    const padTop = 18;
    const padBottom = isNarrow ? 34 : 40;
    const innerWidth = width - padLeft - padRight;
    const innerHeight = height - padTop - padBottom;
    const values = points.map((item) => Number(item.value || 0));
    const rawMax = Math.max(...values, 1);
    const nonZeroValues = values.filter((value) => value > 0);
    const minNonZero = nonZeroValues.length > 0 ? Math.min(...nonZeroValues) : 0;
    const magnitude = 10 ** Math.floor(Math.log10(rawMax));
    const maxValue = Math.ceil(rawMax / magnitude) * magnitude;
    const skewRatio = minNonZero > 0 ? (maxValue / minNonZero) : maxValue;
    const scaleExponent = skewRatio > 12 ? 0.62 : 1;
    const xStep = points.length > 1 ? (innerWidth / (points.length - 1)) : 0;
    const showEvery = currentSalesRange === 'day' ? 4 : (currentSalesRange === 'year' ? 2 : 1);

    let svg = '';
    const tickFont = isNarrow ? 10 : 11;
    for (let i = 0; i <= 4; i += 1) {
      const ratio = i / 4;
      const y = padTop + (innerHeight * ratio);
      const scaleTick = 1 - ratio;
      const value = maxValue * Math.pow(scaleTick, 1 / scaleExponent);
      svg += `<line x1="${padLeft}" y1="${y.toFixed(2)}" x2="${width - padRight}" y2="${y.toFixed(2)}" stroke="rgba(255,255,255,0.08)" stroke-width="1"></line>`;
      svg += `<text x="${padLeft - 8}" y="${(y + 4).toFixed(2)}" text-anchor="end" fill="#bdbdbd" font-size="${tickFont}">${formatCompact(value)}</text>`;
    }
    svg += `<line x1="${padLeft}" y1="${height - padBottom}" x2="${width - padRight}" y2="${height - padBottom}" stroke="#2b2b2b" stroke-width="1"></line>`;

    const coord = points.map((point, index) => {
      const x = padLeft + (xStep * index);
      const rawRatio = maxValue > 0 ? (Number(point.value || 0) / maxValue) : 0;
      const yRatio = Math.pow(rawRatio, scaleExponent);
      const y = height - padBottom - (yRatio * innerHeight);
      return { x, y, label: point.label, value: Number(point.value || 0) };
    });

    if (coord.length === 1) {
      const only = coord[0];
      const singleHeight = Math.max(2, (only.value / maxValue) * innerHeight);
      svg += `<rect x="${(only.x - 14).toFixed(2)}" y="${(height - padBottom - singleHeight).toFixed(2)}" width="28" height="${singleHeight.toFixed(2)}" rx="7" fill="#ffd400"></rect>`;
    } else {
      const linePath = coord.map((p, idx) => `${idx === 0 ? 'M' : 'L'} ${p.x.toFixed(2)} ${p.y.toFixed(2)}`).join(' ');
      const areaPath = `${linePath} L ${(coord[coord.length - 1].x).toFixed(2)} ${(height - padBottom).toFixed(2)} L ${(coord[0].x).toFixed(2)} ${(height - padBottom).toFixed(2)} Z`;
      svg += `<path d="${areaPath}" fill="rgba(255, 212, 0, 0.16)"></path>`;
      svg += `<path d="${linePath}" fill="none" stroke="#ffd400" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path>`;
      coord.forEach((p) => {
        svg += `<circle cx="${p.x.toFixed(2)}" cy="${p.y.toFixed(2)}" r="3.5" fill="#ffd400"></circle>`;
      });
    }

    coord.forEach((p, index) => {
      if (index % showEvery === 0 || index === coord.length - 1) {
        svg += `<text x="${p.x.toFixed(2)}" y="${height - 10}" text-anchor="middle" fill="#d6d6d6" font-size="${tickFont}">${p.label}</text>`;
      }
    });

    salesChartSvg.innerHTML = svg;
  }

  async function fetchSalesData() {
    if (!supabaseClient) return;
    const { data, error } = await supabaseClient
      .from('orders')
      .select('id, total, created_at')
      .order('created_at', { ascending: true });

    if (error) {
      console.warn('Failed to load sales data', error.message);
      return;
    }
    salesOrders = data || [];
    renderSalesChart();
  }

  function setSalesRange(range) {
    currentSalesRange = range;
    salesFilterButtons.forEach((button) => {
      button.classList.toggle('is-active', button.dataset.range === range);
    });
    renderSalesChart();
  }

  salesFilterButtons.forEach((button) => {
    button.addEventListener('click', () => setSalesRange(button.dataset.range || 'week'));
  });

  if (supabaseClient) {
    fetchDashboardProducts();
    fetchSalesData();
    supabaseClient
      .channel('public:products')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'products' }, fetchDashboardProducts)
      .subscribe();
    supabaseClient
      .channel('public:orders')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, fetchSalesData)
      .subscribe();
  }

  window.addEventListener('currency:updated', fetchDashboardProducts);
  window.addEventListener('currency:updated', renderSalesChart);
  window.addEventListener('resize', renderSalesChart);

  const menuToggle = document.getElementById('menuToggle');
  const navOverlay = document.getElementById('navOverlay');

  function setNavOpen(open) {
    document.body.classList.toggle('nav-open', open);
  }

  if (menuToggle) {
    menuToggle.addEventListener('click', () => {
      setNavOpen(!document.body.classList.contains('nav-open'));
    });
  }

  if (navOverlay) {
    navOverlay.addEventListener('click', () => setNavOpen(false));
  }

  document.addEventListener('keydown', (event) => {
    if (event.key === 'Escape') setNavOpen(false);
  });

  window.addEventListener('resize', () => {
    if (window.innerWidth > 900) setNavOpen(false);
  });
</script>

  <script src="i18n-global.js"></script>
  <script src="loading-indicator.js"></script>
</body>
</html>
