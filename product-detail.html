<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product Detail | ArshaApparel</title>
  <link rel="stylesheet" href="product-detail.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <a class="back-link" href="sale-item.html">
      <span class="back-icon" aria-hidden="true">&#8592;</span>
      <span class="logo-text">ArshaApparel</span>
    </a>
    <a class="cart-link" href="cart.html" aria-label="Cart">
      &#128722;
      <span class="cart-badge" id="cartBadge" aria-hidden="true"></span>
    </a>
  </nav>

  <main class="container">
    <section class="detail-layout" id="detailLayout" hidden>
      <div class="detail-image-wrap">
        <div class="detail-image" id="detailImage"></div>
        <button class="detail-nav detail-nav-prev" id="detailPrevBtn" type="button" aria-label="Previous media">&#10094;</button>
        <button class="detail-nav detail-nav-next" id="detailNextBtn" type="button" aria-label="Next media">&#10095;</button>
        <div class="detail-thumbs" id="detailThumbs"></div>
      </div>
      <div class="detail-content">
        <h1 id="detailName">Product</h1>
        <p class="detail-price" id="detailPrice">-</p>
        <div class="detail-meta">
          <p><span id="detailCategoryLabel">Category</span>: <span id="detailCategoryValue">-</span></p>
          <p><span id="detailStockLabel">Stock</span>: <span id="detailStockValue">-</span></p>
        </div>
        <button class="btn-add-cart" id="detailAddToCart" type="button">Add to Cart</button>
      </div>
    </section>

    <section class="detail-description" id="detailDescriptionWrap" hidden>
      <h2 id="detailDescriptionLabel">Description</h2>
      <p id="detailDescriptionText">-</p>
    </section>

    <section class="detail-state" id="detailState">
      <h2 id="detailNotFoundTitle">Products not found</h2>
      <p id="detailNotFoundText">Product detail is not available.</p>
    </section>
  </main>

  <div class="add-cart-modal" id="addCartModal" aria-hidden="true">
    <div class="add-cart-modal-card" role="dialog" aria-modal="true" aria-labelledby="addCartTitle">
      <div class="add-cart-head">
        <h3 id="addCartTitle">Add to Cart</h3>
        <button class="add-cart-close" id="addCartClose" type="button" aria-label="Close">x</button>
      </div>
      <p class="add-cart-name" id="addCartProductName">Product</p>
      <div class="add-cart-field">
        <label id="addCartSizeLabel" for="addCartSize">Size</label>
        <div class="add-cart-size-wrap" id="addCartSizeWrap">
          <button class="add-cart-size-toggle" id="addCartSizeToggle" type="button" aria-expanded="false">
            <span id="addCartSizeValue">Default</span>
            <span class="add-cart-size-caret" aria-hidden="true"></span>
          </button>
          <div class="add-cart-size-dropdown" id="addCartSizeDropdown"></div>
          <select id="addCartSize" tabindex="-1" aria-hidden="true"></select>
        </div>
        <small id="addCartSizeHint"></small>
      </div>
      <div class="add-cart-field">
        <label id="addCartQtyLabel">Quantity</label>
        <div class="add-cart-qty">
          <button type="button" id="addCartQtyMinus">-</button>
          <span id="addCartQtyValue">1</span>
          <button type="button" id="addCartQtyPlus">+</button>
        </div>
      </div>
      <button class="add-cart-confirm" id="addCartConfirm" type="button">Add to Cart</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="supabase-init.js"></script>
  <script src="currency-converter.js"></script>
  <script>
    const supabaseClient = window.supabaseClient;
    const cartBadge = document.getElementById('cartBadge');
    const detailLayout = document.getElementById('detailLayout');
    const detailDescriptionWrap = document.getElementById('detailDescriptionWrap');
    const detailState = document.getElementById('detailState');
    const detailImage = document.getElementById('detailImage');
    const detailPrevBtn = document.getElementById('detailPrevBtn');
    const detailNextBtn = document.getElementById('detailNextBtn');
    const detailName = document.getElementById('detailName');
    const detailPrice = document.getElementById('detailPrice');
    const detailCategoryValue = document.getElementById('detailCategoryValue');
    const detailStockValue = document.getElementById('detailStockValue');
    const detailDescriptionText = document.getElementById('detailDescriptionText');
    const detailThumbs = document.getElementById('detailThumbs');
    const detailAddToCart = document.getElementById('detailAddToCart');
    const addCartModal = document.getElementById('addCartModal');
    const addCartClose = document.getElementById('addCartClose');
    const addCartProductName = document.getElementById('addCartProductName');
    const addCartSize = document.getElementById('addCartSize');
    const addCartSizeWrap = document.getElementById('addCartSizeWrap');
    const addCartSizeToggle = document.getElementById('addCartSizeToggle');
    const addCartSizeValue = document.getElementById('addCartSizeValue');
    const addCartSizeDropdown = document.getElementById('addCartSizeDropdown');
    const addCartSizeHint = document.getElementById('addCartSizeHint');
    const addCartQtyMinus = document.getElementById('addCartQtyMinus');
    const addCartQtyPlus = document.getElementById('addCartQtyPlus');
    const addCartQtyValue = document.getElementById('addCartQtyValue');
    const addCartConfirm = document.getElementById('addCartConfirm');
    const productId = new URLSearchParams(window.location.search).get('id');
    const backLink = document.querySelector('.back-link');
    let currentProduct = null;
    let currentProductImages = [];
    let currentImageIndex = 0;
    let touchStartX = 0;
    let mediaSwapTimer = null;
    let selectedAddCartQty = 1;
    let cartSupportsSize = true;
    let productSupportsSizes = true;

    function tr(key) {
      if (window.__i18nTr) return window.__i18nTr(key);
      const fallback = {
        add_to_cart: 'Add to Cart',
        unavailable: 'Unavailable',
        stock_not_enough: 'Product stock is not enough.',
        choose_size_required: 'Please choose a size.',
        size_default: 'Default',
        no_size_selection: 'No size selection for this product.',
        size_count_available: '{{count}} size(s) available.',
        product_col: 'Product',
        products_not_found: 'Products not found',
        product_detail_not_found: 'Product detail is not available.',
        no_description: 'No description yet.'
      };
      return fallback[key] || key;
    }

    function trf(key, params) {
      if (window.__i18nTrf) return window.__i18nTrf(key, params);
      const text = tr(key);
      if (!params) return text;
      return String(text).replace(/\{\{(\w+)\}\}/g, (_, token) => (
        params[token] != null ? String(params[token]) : ''
      ));
    }

    let themeAlertTimer = null;
    function showThemeAlert(message) {
      if (!message) return;
      const existing = document.getElementById('themeAlert');
      if (existing) existing.remove();

      const alertEl = document.createElement('div');
      alertEl.id = 'themeAlert';
      alertEl.className = 'theme-alert';
      alertEl.setAttribute('role', 'alert');
      alertEl.textContent = String(message);
      document.body.appendChild(alertEl);

      requestAnimationFrame(() => alertEl.classList.add('is-show'));
      if (themeAlertTimer) clearTimeout(themeAlertTimer);
      themeAlertTimer = setTimeout(() => {
        alertEl.classList.remove('is-show');
        setTimeout(() => alertEl.remove(), 200);
      }, 2400);
    }

    function formatPrice(value) {
      const number = Number(value);
      if (Number.isNaN(number)) return '-';
      const lang = localStorage.getItem('siteLanguage') || 'en';
      return (window.currencyService && window.currencyService.formatFromIDR)
        ? window.currencyService.formatFromIDR(number, lang)
        : number;
    }

    function getUserId() {
      const stored = localStorage.getItem('loginInfo') || sessionStorage.getItem('loginInfo');
      if (!stored) return null;
      try {
        const data = JSON.parse(stored);
        if (data.role !== 'user') return null;
        return data.email || data.name || null;
      } catch (error) {
        return null;
      }
    }

    function setCartBadge(count) {
      if (!cartBadge) return;
      if (count > 0) {
        cartBadge.textContent = count > 99 ? '99+' : String(count);
        cartBadge.style.display = 'inline-flex';
      } else {
        cartBadge.style.display = 'none';
      }
    }

    async function fetchCartCount() {
      if (!supabaseClient || !cartBadge) return;
      const userId = getUserId();
      if (!userId) {
        setCartBadge(0);
        return;
      }
      const { data, error } = await supabaseClient
        .from('cart_items')
        .select('quantity, product:products(status)')
        .eq('user_id', userId);

      if (error) return;
      const count = (data || []).reduce((sum, item) => {
        if (item.product?.status === 'draft') return sum;
        return sum + (item.quantity || 0);
      }, 0);
      setCartBadge(count);
    }

    function renderNotFound() {
      detailLayout.hidden = true;
      detailDescriptionWrap.hidden = true;
      detailState.hidden = false;
      document.title = tr('products_not_found') + ' | ArshaApparel';
    }

    function normalizeImageList(product) {
      if (!product) return [];
      if (Array.isArray(product.images)) {
        return product.images.filter((url) => typeof url === 'string' && url.trim());
      }
      if (typeof product.images === 'string') {
        try {
          const parsed = JSON.parse(product.images);
          if (Array.isArray(parsed)) {
            return parsed.filter((url) => typeof url === 'string' && url.trim());
          }
        } catch (error) {}
      }
      if (product.image && typeof product.image === 'string') return [product.image];
      return [];
    }

    function normalizeSizeList(product) {
      if (!product) return [];
      if (Array.isArray(product.sizes)) {
        return product.sizes.filter((value) => typeof value === 'string' && value.trim());
      }
      if (typeof product.sizes === 'string') {
        try {
          const parsed = JSON.parse(product.sizes);
          if (Array.isArray(parsed)) {
            return parsed.filter((value) => typeof value === 'string' && value.trim());
          }
        } catch (error) {}
      }
      return [];
    }

    function isVideoUrl(url) {
      return /\.(mp4|webm|ogg|mov|m4v)$/i.test(String(url || ''));
    }

    function renderMediaMarkup(url, className, withControls) {
      if (!url) return '';
      if (isVideoUrl(url)) {
        return `<video class="${className}" src="${url}" ${withControls ? 'controls' : ''} playsinline preload="metadata"></video>`;
      }
      return `<img class="${className}" src="${url}" alt="Product media" loading="lazy">`;
    }

    function setMainImage(url, animate) {
      if (!detailImage) return;
      const updateMedia = () => {
        detailImage.innerHTML = url ? renderMediaMarkup(url, 'detail-media-el', true) : '';
      };
      if (animate) {
        detailImage.classList.add('is-swapping');
        if (mediaSwapTimer) clearTimeout(mediaSwapTimer);
        mediaSwapTimer = setTimeout(() => {
          updateMedia();
          detailImage.classList.remove('is-swapping');
        }, 130);
      } else {
        updateMedia();
        detailImage.classList.remove('is-swapping');
      }
      if (detailThumbs) {
        detailThumbs.querySelectorAll('.detail-thumb').forEach((button) => {
          button.classList.toggle('is-active', button.dataset.url === url);
        });
      }
    }

    function updateSliderControls() {
      const hasMultiple = currentProductImages.length > 1;
      if (detailPrevBtn) {
        const hidePrev = !hasMultiple || currentImageIndex <= 0;
        detailPrevBtn.hidden = hidePrev;
        detailPrevBtn.style.display = hidePrev ? 'none' : 'inline-flex';
        detailPrevBtn.disabled = false;
      }
      if (detailNextBtn) {
        const hideNext = !hasMultiple || currentImageIndex >= currentProductImages.length - 1;
        detailNextBtn.hidden = hideNext;
        detailNextBtn.style.display = hideNext ? 'none' : 'inline-flex';
        detailNextBtn.disabled = false;
      }
    }

    function goToImage(index, animate) {
      if (!currentProductImages.length) return;
      const maxIndex = currentProductImages.length - 1;
      currentImageIndex = Math.max(0, Math.min(index, maxIndex));
      setMainImage(currentProductImages[currentImageIndex], animate !== false);
      updateSliderControls();
    }

    function renderThumbs(images) {
      if (!detailThumbs) return;
      if (!images || images.length < 2) {
        detailThumbs.innerHTML = '';
        detailThumbs.hidden = true;
        return;
      }
      detailThumbs.hidden = false;
      detailThumbs.innerHTML = images.map((url, index) => `
        <button class="detail-thumb${index === 0 ? ' is-active' : ''}" type="button" data-url="${url}" aria-label="Image ${index + 1}">
          ${renderMediaMarkup(url, 'detail-thumb-media', false)}
        </button>
      `).join('');
    }

    function setAddCartModalOpen(open) {
      if (!addCartModal) return;
      addCartModal.classList.toggle('is-open', open);
      addCartModal.setAttribute('aria-hidden', open ? 'false' : 'true');
      if (!open) setAddCartSizeOpen(false);
    }

    function setAddCartSizeOpen(open) {
      if (!addCartSizeWrap || !addCartSizeToggle || addCartSizeToggle.disabled) return;
      addCartSizeWrap.classList.toggle('is-open', open);
      addCartSizeToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
    }

    function syncAddCartSizeUI() {
      if (!addCartSize || !addCartSizeValue || !addCartSizeDropdown) return;
      const selectedOption = addCartSize.options[addCartSize.selectedIndex];
      addCartSizeValue.textContent = selectedOption?.textContent || tr('size_default');
      addCartSizeDropdown.querySelectorAll('.add-cart-size-option').forEach((option) => {
        option.classList.toggle('is-active', option.dataset.value === addCartSize.value);
      });
    }

    function renderAddCartSizeOptions(product) {
      if (!addCartSize) return;
      const fallbackSizeByCategory = {
        shirt: ['XS', 'S', 'M', 'L', 'XL', 'XXL'],
        't-shirt': ['XS', 'S', 'M', 'L', 'XL', 'XXL'],
        jacket: ['S', 'M', 'L', 'XL', 'XXL'],
        hoodie: ['S', 'M', 'L', 'XL', 'XXL'],
        pants: ['28', '30', '32', '34', '36', '38'],
        shoes: ['38', '39', '40', '41', '42', '43', '44'],
        sandals: ['38', '39', '40', '41', '42', '43'],
        socks: ['S-M', 'L-XL']
      };
      let sizes = normalizeSizeList(product);
      if (sizes.length === 0) {
        const key = String(product?.category || '').toLowerCase();
        sizes = fallbackSizeByCategory[key] || [];
      }
      if (sizes.length === 0) {
        addCartSize.innerHTML = `<option value="">${tr('size_default')}</option>`;
        addCartSize.disabled = true;
        if (addCartSizeToggle) addCartSizeToggle.disabled = true;
        if (addCartSizeDropdown) addCartSizeDropdown.innerHTML = '';
        syncAddCartSizeUI();
        if (addCartSizeHint) addCartSizeHint.textContent = tr('no_size_selection');
        return;
      }
      addCartSize.disabled = false;
      if (addCartSizeToggle) addCartSizeToggle.disabled = false;
      addCartSize.innerHTML = sizes.map((size) => `<option value="${size}">${size}</option>`).join('');
      if (addCartSizeDropdown) {
        addCartSizeDropdown.innerHTML = sizes.map((size) => (
          `<button class="add-cart-size-option" type="button" data-value="${size}">${size}</button>`
        )).join('');
      }
      syncAddCartSizeUI();
      if (addCartSizeHint) addCartSizeHint.textContent = trf('size_count_available', { count: sizes.length });
    }

    function renderProduct(product) {
      if (!product) {
        renderNotFound();
        return;
      }
      currentProduct = product;
      currentProductImages = normalizeImageList(product);
      const categoryKey = window.__i18nCategoryKey ? window.__i18nCategoryKey(product.category) : null;
      const categoryText = categoryKey ? tr(categoryKey) : (product.category || '-');
      const descriptionText = String(product.description || '').trim() || tr('no_description');
      const hasStock = typeof product.stock === 'number';
      const mainImage = currentProductImages[0] || product.image || null;
      if (currentProductImages.length === 0 && mainImage) {
        currentProductImages = [mainImage];
      }
      currentImageIndex = 0;

      detailName.textContent = product.name || '-';
      detailPrice.textContent = formatPrice(product.price);
      detailCategoryValue.textContent = categoryText;
      detailStockValue.textContent = hasStock ? String(product.stock) : '-';
      detailDescriptionText.textContent = descriptionText;

      goToImage(0, false);
      renderThumbs(currentProductImages);
      updateSliderControls();

      if (detailAddToCart) {
        const unavailable = product.status === 'out' || (hasStock && product.stock < 1);
        detailAddToCart.disabled = unavailable;
        detailAddToCart.textContent = unavailable ? tr('unavailable') : tr('add_to_cart');
      }

      detailLayout.hidden = false;
      detailDescriptionWrap.hidden = false;
      detailState.hidden = true;
      document.title = (product.name || tr('product_col')) + ' | ArshaApparel';
    }

    async function fetchProductDetail() {
      if (!supabaseClient || !productId) {
        renderNotFound();
        return;
      }
      const { data, error } = await supabaseClient
        .from('products')
        .select('*')
        .eq('id', productId)
        .neq('status', 'draft')
        .maybeSingle();

      if (error || !data) {
        renderNotFound();
        return;
      }
      renderProduct(data);
    }

    async function addToCart(productIdToAdd, quantity, selectedSize) {
      if (!supabaseClient || !productIdToAdd) return false;
      const userId = getUserId();
      if (!userId) {
        window.location.href = 'login.html';
        return false;
      }
      const qty = Math.max(1, Number(quantity || 1));

      let productData = null;
      let productError = null;
      ({ data: productData, error: productError } = await supabaseClient
        .from('products')
        .select(productSupportsSizes ? 'stock, status, name, sizes' : 'stock, status, name')
        .eq('id', productIdToAdd)
        .maybeSingle());

      if (productError && /sizes/i.test(String(productError.message || ''))) {
        productSupportsSizes = false;
        ({ data: productData, error: productError } = await supabaseClient
          .from('products')
          .select('stock, status, name')
          .eq('id', productIdToAdd)
          .maybeSingle());
      }

      if (productError || !productData || productData.status === 'draft') {
        return false;
      }

      const sizes = normalizeSizeList(productData);
      if (sizes.length > 0 && !selectedSize) {
        showThemeAlert(tr('choose_size_required'));
        return false;
      }

      let data = null;
      let error = null;
      ({ data, error } = await supabaseClient
        .from('cart_items')
        .select(cartSupportsSize ? 'id, quantity, size' : 'id, quantity')
        .eq('user_id', userId)
        .eq('product_id', productIdToAdd)
        .order('created_at', { ascending: false }));

      if (error && /size/i.test(String(error.message || ''))) {
        cartSupportsSize = false;
        ({ data, error } = await supabaseClient
          .from('cart_items')
          .select('id, quantity')
          .eq('user_id', userId)
          .eq('product_id', productIdToAdd)
          .order('created_at', { ascending: false }));
      }

      if (error && error.code !== 'PGRST116') return false;

      const rows = Array.isArray(data) ? data : [];
      const totalInCart = rows.reduce((sum, item) => sum + Number(item.quantity || 0), 0);
      const matched = rows.find((item) => ((item.size || '') === (selectedSize || '')) || (!cartSupportsSize));
      const stock = Number(productData.stock);
      const hasStock = Number.isFinite(stock) && stock >= 0;
      if (hasStock && (totalInCart + qty) > stock) {
        showThemeAlert(trf('stock_max', { stock }));
        return false;
      }

      if (matched?.id) {
        const next = Number(matched.quantity || 0) + qty;
        await supabaseClient
          .from('cart_items')
          .update({ quantity: next })
          .eq('id', matched.id);
      } else {
        if (hasStock && stock < qty) {
          showThemeAlert(tr('stock_not_enough'));
          return false;
        }
        await supabaseClient
          .from('cart_items')
          .insert(cartSupportsSize
            ? { user_id: userId, product_id: productIdToAdd, size: selectedSize || null, quantity: qty }
            : { user_id: userId, product_id: productIdToAdd, quantity: qty });
      }

      fetchCartCount();
      return true;
    }

    if (detailAddToCart) {
      detailAddToCart.addEventListener('click', () => {
        if (!currentProduct?.id) return;
        selectedAddCartQty = 1;
        if (addCartQtyValue) addCartQtyValue.textContent = String(selectedAddCartQty);
        if (addCartProductName) addCartProductName.textContent = currentProduct.name || tr('product_col');
        renderAddCartSizeOptions(currentProduct);
        setAddCartModalOpen(true);
      });
    }

    if (detailThumbs) {
      detailThumbs.addEventListener('click', (event) => {
        const button = event.target.closest('.detail-thumb');
        if (!button) return;
        const url = button.dataset.url;
        if (!url) return;
        const index = currentProductImages.findIndex((item) => item === url);
        if (index > -1) {
          goToImage(index);
        } else {
          setMainImage(url);
        }
      });
    }

    if (detailPrevBtn) {
      detailPrevBtn.addEventListener('click', () => goToImage(currentImageIndex - 1));
    }

    if (detailNextBtn) {
      detailNextBtn.addEventListener('click', () => goToImage(currentImageIndex + 1));
    }

    if (detailImage) {
      detailImage.addEventListener('touchstart', (event) => {
        touchStartX = event.changedTouches?.[0]?.clientX || 0;
      }, { passive: true });
      detailImage.addEventListener('touchend', (event) => {
        const endX = event.changedTouches?.[0]?.clientX || 0;
        const delta = endX - touchStartX;
        if (Math.abs(delta) < 36) return;
        if (delta < 0) goToImage(currentImageIndex + 1);
        if (delta > 0) goToImage(currentImageIndex - 1);
      }, { passive: true });
    }

    if (backLink) {
      backLink.addEventListener('click', (event) => {
        event.preventDefault();
        if (window.history.length > 1) {
          window.history.back();
        } else {
          window.location.href = 'sale-item.html';
        }
      });
    }

    if (addCartQtyMinus) {
      addCartQtyMinus.addEventListener('click', () => {
        selectedAddCartQty = Math.max(1, selectedAddCartQty - 1);
        if (addCartQtyValue) addCartQtyValue.textContent = String(selectedAddCartQty);
      });
    }

    if (addCartQtyPlus) {
      addCartQtyPlus.addEventListener('click', () => {
        const stock = Number(currentProduct?.stock);
        if (Number.isFinite(stock) && stock >= 0 && selectedAddCartQty >= stock) {
          showThemeAlert(trf('stock_max', { stock }));
          return;
        }
        selectedAddCartQty += 1;
        if (addCartQtyValue) addCartQtyValue.textContent = String(selectedAddCartQty);
      });
    }

    if (addCartClose) {
      addCartClose.addEventListener('click', () => setAddCartModalOpen(false));
    }

    if (addCartModal) {
      addCartModal.addEventListener('click', (event) => {
        if (event.target === addCartModal) setAddCartModalOpen(false);
      });
    }

    if (addCartConfirm) {
      addCartConfirm.addEventListener('click', async () => {
        if (!currentProduct?.id) return;
        const stock = Number(currentProduct?.stock);
        if (Number.isFinite(stock) && stock >= 0 && selectedAddCartQty > stock) {
          showThemeAlert(trf('stock_max', { stock }));
          return;
        }
        const size = addCartSize && !addCartSize.disabled ? addCartSize.value : null;
        const ok = await addToCart(currentProduct.id, selectedAddCartQty, size);
        if (ok) setAddCartModalOpen(false);
      });
    }

    if (addCartSizeToggle) {
      addCartSizeToggle.addEventListener('click', () => {
        const open = addCartSizeWrap?.classList.contains('is-open');
        setAddCartSizeOpen(!open);
      });
    }

    if (addCartSizeDropdown) {
      addCartSizeDropdown.addEventListener('click', (event) => {
        const option = event.target.closest('.add-cart-size-option');
        if (!option || !addCartSize) return;
        addCartSize.value = option.dataset.value || '';
        syncAddCartSizeUI();
        setAddCartSizeOpen(false);
      });
    }

    if (addCartSize) {
      addCartSize.addEventListener('change', syncAddCartSizeUI);
    }

    document.addEventListener('click', (event) => {
      if (addCartSizeWrap && !addCartSizeWrap.contains(event.target)) {
        setAddCartSizeOpen(false);
      }
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') setAddCartSizeOpen(false);
    });

    window.addEventListener('currency:updated', () => {
      if (currentProduct) renderProduct(currentProduct);
    });

    fetchProductDetail();
    fetchCartCount();
  </script>
  <script src="i18n-global.js"></script>
  <script src="loading-indicator.js"></script>
</body>
</html>
